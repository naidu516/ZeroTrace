<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ZeroTrace Tools</title>

<style>
body {
  background: #050505;
  color: #00ffcc;
  font-family: monospace;
  padding: 30px;
}

/* TITLE */
h1 {
  text-shadow: 0 0 10px #00ffcc;
  margin-bottom: 20px;
}

/* GRID */
.tools {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 20px;
  margin-bottom: 30px;
}

.card {
  padding: 20px;
  border-radius: 12px;
  border: 1px solid #00ffcc;
  text-align: center;
  cursor: pointer;
  transition: 0.3s;
}

.card:hover {
  background: #00ffcc;
  color: black;
  box-shadow: 0 0 15px #00ffcc;
}

/* TERMINAL */
.terminal {
  background: black;
  border: 1px solid #00ffcc;
  padding: 20px;
  height: 200px;
  overflow-y: auto;
  box-shadow: 0 0 15px #00ffcc;
  font-size: 14px;
}

/* BACK BUTTON */
.back {
  margin-top: 20px;
  display: inline-block;
  padding: 10px 20px;
  background: #00ffcc;
  color: black;
  border-radius: 8px;
  cursor: pointer;
}
</style>

</head>

<body>

<h1>💀 ZeroTrace Tools Hub</h1>

<div class="tools">
  <div class="card" onclick="go('bugbounty.html')">🐞 Bug Bounty</div>
  <div class="card" onclick="go('burpsuite.html')">💥 Burp Suite</div>
  <div class="card" onclick="go('sqlmap.html')">🧪 SQLMap</div>
  <div class="card" onclick="go('nmap.html')">🌐 Nmap</div>
  <div class="card" onclick="go('kali.html')">🐍 Kali Linux</div>
  <div class="card" onclick="go('wireshark.html')">🦈 Wireshark</div>
  <div class="card" onclick="go('john.html')">🔐 John the Ripper</div>
</div>

<!-- 🔥 HACKER TERMINAL -->
<div class="terminal" id="terminal"></div>

<!-- BACK BUTTON -->
<div class="back" onclick="go('../index.html')">⬅ Back to Dashboard</div>

<script>
window.go = function(page) {
  window.location.href = page;
};

/* 🔥 HACKER SIMULATION */
const terminal = document.getElementById("terminal");

const lines = [
  "Initializing ZeroTrace System...",
  "Loading hacking modules...",
  "Connecting to secure server...",
  "Bypassing firewall...",
  "Scanning open ports...",
  "Running Nmap scan...",
  "Checking vulnerabilities...",
  "Injecting SQL payload...",
  "Access granted...",
  "Tracking network packets...",
  "Decrypting data streams...",
  "System secured successfully ✅"
];

let i = 0;

function typeLine() {
  if (i < lines.length) {
    terminal.innerHTML += "> " + lines[i] + "<br>";
    terminal.scrollTop = terminal.scrollHeight;
    i++;
    setTimeout(typeLine, 800);
  } else {
    i = 0;
    setTimeout(() => {
      terminal.innerHTML = "";
      typeLine();
    }, 2000);
  }
}

typeLine();
</script>

</body>
</html>
