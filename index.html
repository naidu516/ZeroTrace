<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ZeroTrace OS</title>

<style>
body {
    margin: 0;
    background: black;
    color: #00ff9f;
    font-family: monospace;
    overflow: hidden;
}

/* CENTER */
.container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* TERMINAL BOX */
.terminal {
    width: 80%;
    max-width: 800px;
    border: 1px solid #00ff9f;
    padding: 20px;
    box-shadow: 0 0 20px #00ff9f;
}

/* TEXT */
#text {
    white-space: pre-line;
}

/* CURSOR */
.cursor {
    display: inline-block;
    width: 10px;
    background: #00ff9f;
    margin-left: 5px;
    animation: blink 1s infinite;
}

@keyframes blink {
    0%, 50%, 100% {opacity: 1;}
    25%, 75% {opacity: 0;}
}

/* BUTTON */
button {
    margin-top: 20px;
    background: transparent;
    color: #00ff9f;
    border: 1px solid #00ff9f;
    padding: 10px 20px;
    cursor: pointer;
    display: none;
}

button:hover {
    background: #00ff9f;
    color: black;
}

/* FOOTER */
.footer {
    position: absolute;
    bottom: 10px;
    width: 100%;
    text-align: center;
    font-size: 12px;
    opacity: 0.6;
}
</style>
</head>

<body>

<div class="container">
    <div class="terminal">
        <div id="text"></div><span class="cursor"></span>
        <br>
        <button id="startBtn" onclick="goLogin()">ENTER SYSTEM 🚀</button>
    </div>
</div>

<div class="footer">
    ⚠ ZeroTrace OS | All Rights Reserved © 2026  
    <br>
    This platform is strictly for ethical cybersecurity learning. Unauthorized or illegal use is prohibited.
</div>

<script>
const lines = [
"Initializing ZeroTrace OS...",
"Loading secure modules...",
"Bypassing threats...",
"System integrity check: OK",
"",
"⚡ Welcome to ZeroTrace ⚡",
"",
"An Ethical Cybersecurity Learning Platform",
"",
"⚠ WARNING:",
"This system is monitored.",
"Only ethical and legal activities are permitted.",
"Any misuse will result in permanent access restriction.",
"",
"Access Ready..."
];

let i = 0;
let j = 0;
let currentLine = "";
const speed = 30;

function type() {
    if (i < lines.length) {
        if (j < lines[i].length) {
            currentLine += lines[i][j];
            document.getElementById("text").innerText = currentLine;
            j++;
            setTimeout(type, speed);
        } else {
            currentLine += "\n";
            i++;
            j = 0;
            setTimeout(type, 300);
        }
    } else {
        document.getElementById("startBtn").style.display = "inline-block";
    }
}

type();

function goLogin() {
    window.location.href = "dashboard.html";
}
</script>

</body>
</html>
