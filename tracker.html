<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ZeroTrace Tracker</title>

<style>
body {
  background: #0a0f14;
  color: #00ffcc;
  font-family: monospace;
  text-align: center;
}

.title {
  font-size: 30px;
  margin-top: 20px;
  text-shadow: 0 0 10px #00ffcc;
}

.tracker-box {
  width: 60%;
  margin: 30px auto;
  padding: 20px;
  border: 1px solid #00ffcc;
  box-shadow: 0 0 20px #00ffcc;
}

input, textarea {
  width: 90%;
  margin: 10px;
  padding: 10px;
  background: transparent;
  border: 1px solid #00ffcc;
  color: #00ffcc;
}

button {
  padding: 10px 20px;
  border: 1px solid #00ffcc;
  background: transparent;
  color: #00ffcc;
  cursor: pointer;
}

button:hover {
  background: #00ffcc;
  color: black;
}

.entry-card {
  width: 60%;
  margin: 20px auto;
  padding: 15px;
  border: 1px solid #00ffcc;
}

.delete-btn {
  border: 1px solid red;
  color: red;
}

#toast {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #00ffcc;
  color: black;
  padding: 10px;
  display: none;
}
</style>

</head>

<body>

<h1 class="title">🧠 ZeroTrace Dashboard</h1>

<div class="tracker-box">
  <input type="date" id="date">
  <textarea id="learn" placeholder="What did you learn?"></textarea>
  <textarea id="plan" placeholder="Plan for tomorrow"></textarea>
  <br>
  <button onclick="saveEntry()">Save Entry</button>
</div>

<div id="entriesList"></div>

<div id="toast">Saved ✅</div>

<script>
const today = new Date().toISOString().split('T')[0];
document.getElementById("date").value = today;
</script>

<!-- ONLY THIS SCRIPT -->
<script type="module" src="assets/js/main.js"></script>

</body>
</html>
