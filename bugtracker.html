<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ZeroTrace Bug Tracker</title>

<style>
body{
    background:#000;
    color:#00ffc3;
    font-family:monospace;
    text-align:center;
}

h1{
    text-shadow:0 0 10px #00ffc3;
}

/* FORM */
.container{
    border:2px solid #00ffc3;
    width:70%;
    margin:auto;
    padding:20px;
    box-shadow:0 0 20px #00ffc3;
}

input, select, textarea{
    width:80%;
    margin:10px;
    padding:10px;
    background:black;
    color:#00ffc3;
    border:1px solid #00ffc3;
}

/* BUTTON */
button{
    padding:8px 15px;
    margin:5px;
    border:1px solid #00ffc3;
    background:none;
    color:#00ffc3;
    cursor:pointer;
}

button:hover{
    background:#00ffc3;
    color:black;
}

/* STATS */
.stats{
    display:flex;
    justify-content:center;
    gap:20px;
    margin:15px;
}

.stat-box{
    border:1px solid #00ffc3;
    padding:10px;
}

/* BUG CARD */
.bug{
    border:1px solid #00ffc3;
    margin:15px;
    padding:15px;
    position:relative;
    text-align:left;
}

/* ACTIONS */
.delete{
    position:absolute;
    right:10px;
    top:10px;
    color:red;
    border:1px solid red;
}

.edit{
    position:absolute;
    right:70px;
    top:10px;
    color:yellow;
    border:1px solid yellow;
}

.delete:hover{
    background:red;
    color:black;
}

.edit:hover{
    background:yellow;
    color:black;
}

/* SEARCH */
.search{
    width:50%;
}

/* STATUS COLORS */
.open{color:red;}
.progress{color:orange;}
.fixed{color:lime;}
</style>

</head>

<body>

<h1>🐞 ZeroTrace Bug Tracker</h1>

<!-- STATS -->
<div class="stats">
<div class="stat-box">Total: <span id="total">0</span></div>
<div class="stat-box">Open: <span id="openCount">0</span></div>
<div class="stat-box">Fixed: <span id="fixedCount">0</span></div>
</div>

<!-- FORM -->
<div class="container">

<input id="title" placeholder="Bug Title"><br>

<textarea id="desc" placeholder="Bug Description"></textarea><br>

<select id="priority">
<option>Low</option>
<option>Medium</option>
<option>High</option>
</select><br>

<select id="status">
<option>Open</option>
<option>In Progress</option>
<option>Fixed</option>
</select><br>

<button onclick="addBug()">Add Bug</button>

</div>

<!-- SEARCH + FILTER -->
<input class="search" id="search" placeholder="Search..." onkeyup="render()"><br>

<select onchange="render()" id="filter">
<option value="All">All</option>
<option value="Open">Open</option>
<option value="In Progress">In Progress</option>
<option value="Fixed">Fixed</option>
</select>

<!-- BUG LIST -->
<div id="bugs"></div>

<button onclick="history.back()">← Back</button>

<script>

let bugs = JSON.parse(localStorage.getItem("bugs")) || [];

/* ADD */
function addBug(){
    let title = document.getElementById("title").value;
    let desc = document.getElementById("desc").value;
    let priority = document.getElementById("priority").value;
    let status = document.getElementById("status").value;

    if(!title) return alert("Enter title");

    bugs.push({title, desc, priority, status});
    localStorage.setItem("bugs", JSON.stringify(bugs));

    document.getElementById("title").value="";
    document.getElementById("desc").value="";

    render();
}

/* DELETE */
function deleteBug(i){
    bugs.splice(i,1);
    localStorage.setItem("bugs", JSON.stringify(bugs));
    render();
}

/* EDIT */
function editBug(i){
    let b = bugs[i];

    document.getElementById("title").value = b.title;
    document.getElementById("desc").value = b.desc;
    document.getElementById("priority").value = b.priority;
    document.getElementById("status").value = b.status;

    deleteBug(i);
}

/* RENDER */
function render(){

    let container = document.getElementById("bugs");
    let search = document.getElementById("search").value.toLowerCase();
    let filter = document.getElementById("filter").value;

    container.innerHTML="";

    let open=0, fixed=0;

    bugs.forEach((b,i)=>{

        if(
            (filter !== "All" && b.status !== filter) ||
            (!b.title.toLowerCase().includes(search))
        ) return;

        if(b.status==="Open") open++;
        if(b.status==="Fixed") fixed++;

        let statusClass =
            b.status==="Open" ? "open" :
            b.status==="In Progress" ? "progress" : "fixed";

        container.innerHTML += `
        <div class="bug">

            <button class="edit" onclick="editBug(${i})">Edit</button>
            <button class="delete" onclick="deleteBug(${i})">X</button>

            <h3>${b.title}</h3>

            <p>${b.desc}</p>

            Priority: <b>${b.priority}</b><br>
            Status: <b class="${statusClass}">${b.status}</b>

        </div>
        `;
    });

    document.getElementById("total").innerText = bugs.length;
    document.getElementById("openCount").innerText = open;
    document.getElementById("fixedCount").innerText = fixed;
}

render();

</script>

</body>
</html>
