<body>

<div class="sidebar">
  <h2>⚙ ZeroTrace</h2>
  <ul>
    <li onclick="go('userguide.html')">User Guide</li>
    <li onclick="go('project.html')">Project</li>
    <li onclick="go('tools/tools.html')">Tools</li>
    <li onclick="go('cyberattacks.html')">Cyber Attacks</li>
    <li onclick="go('python/info_gathering/info.html')">🐍 Python Scripts</li>
    <li onclick="go('practice/terminal-bruteforce.html')">💀 Brute Force</li>
    <li onclick="go('practice/xss-terminal.html')">🔥 XSS</li>
    <li onclick="go('practice/nmap-terminal.html')">🔍 Nmap</li>
    <li onclick="go('practice/wireshark-terminal.html')">🌐 Wireshark</li>
    <li onclick="go('practice/burp-terminal.html')">🟣 Burp Suite</li>
    <li onclick="go('practice/gobuster-terminal.html')">📁 Gobuster</li>
    <li onclick="go('practice/wayback-terminal.html')">☁ Wayback</li>
    <li onclick="go('practice/sql-terminal.html')">⚡ SQL Injection</li>
  </ul>
</div>

<div class="main">

  <div class="topbar">
    <button onclick="logout()">Logout</button>
  </div>

  <h2 id="welcome">Loading...</h2>

  <div id="terminal" class="terminal-box"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

/* CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyDmxHZD0ZhG4xV5baookq6gNReaCay09tM",
  authDomain: "zerotrace-8f464.firebaseapp.com",
  projectId: "zerotrace-8f464",
  appId: "1:721450663659:web:137e7e4f2a4de6044508ae"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

let terminal = document.getElementById("terminal");
let input = "";
let currentUser = "user";

/* 🔥 FIREWALL (ADDED ONLY) */
function firewall(domain) {
  if (!domain) return false;

  const patterns = [
    /[;&|`$]/,
    /<script>/i,
    /\.\./,
    /\/\//,
    /select .* from/i,
    /union .* select/i,
    /drop table/i,
    /insert into/i
  ];

  for (let p of patterns) {
    if (p.test(domain)) return false;
  }

  const valid = /^(?!:\/\/)([a-zA-Z0-9-]+\.)+[a-zA-Z]{2,}$/;
  return valid.test(domain);
}

/* 🔥 NO LOOP AUTH FIX */
let checked = false;

onAuthStateChanged(auth, (user) => {

  if (checked) return;
  checked = true;

  if (user) {
    currentUser = user.displayName || "hacker";
    document.getElementById("welcome").innerText = "Welcome " + currentUser + " 🚀";
  } else {
    setTimeout(() => {
      if (!auth.currentUser) {
        window.location.href = "login.html";
      }
    }, 800);
  }

});

window.go = (p) => location.href = p;
window.logout = () => signOut(auth).then(()=>location.href="login.html");

function print(t){
  const d = document.createElement("div");
  d.textContent = t;
  terminal.appendChild(d);
}

function prompt(){
  const d = document.createElement("div");
  d.id = "cur";
  terminal.appendChild(d);
  update();
}

function update(){
  const d = document.getElementById("cur");
  if(d){
    d.textContent = `${currentUser}@zerotrace:/home/user$ ${input}`;
  }
}

function boot(){
  terminal.innerHTML="";
  print("ZeroTrace OS Booting...");
  print("Type 'help'");
  prompt();
}

function run(cmd){
  document.getElementById("cur").id="";

  print(`${currentUser}@zerotrace:/home/user$ ${cmd}`);

  if(cmd==="help") print("ls cd pwd clear");
  else if(cmd==="ls") print("userguide project tools cyberattacks");
  else if(cmd==="pwd") print("/home/user");
  else if(cmd==="clear"){ boot(); return; }

  else if(cmd.startsWith("subdomain ")) {
    let domain = cmd.split(" ")[1];

    /* 🔥 FIREWALL CHECK (ADDED ONLY) */
    if (!firewall(domain)) {
        print("🚫 Blocked by firewall");
        prompt();
        return;
    }

    print("Running subdomain scan on " + domain + "...");

    fetch("http://127.0.0.1:5000/subdomain", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ domain: domain })
    })
    .then(res => res.json())
    .then(data => {
        print("===== SUBDOMAINS =====");

        if (data.length === 0) {
            print("No subdomains found");
        } else {
            data.forEach(item => {
                print(item.subdomain + " → " + item.ip);
            });
        }

        prompt();
    })
    .catch(() => {
        print("Error connecting to backend");
        prompt();
    });

    return;
}

  else print("command not found");

  prompt();
}

window.addEventListener("keydown",(e)=>{

  e.preventDefault();

  if(e.key.length===1){
    input+=e.key;
    update();
  }

  else if(e.key==="Backspace"){
    input=input.slice(0,-1);
    update();
  }

  else if(e.key==="Enter"){
    const cmd=input.trim();
    input="";
    cmd?run(cmd):prompt();
  }

});

boot();

</script>

</body>
</html>
