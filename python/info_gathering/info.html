<!DOCTYPE html>
<html lang="en">
<head>
    <title>ZeroTrace Info Gathering</title>

    <style>
        body {
            background: black;
            color: #00ff99;
            font-family: monospace;
            text-align: center;
        }

        h1 {
            margin-top: 30px;
            text-shadow: 0 0 10px #00ff99;
        }

        button {
            background: black;
            color: #00ff99;
            border: 1px solid #00ff99;
            padding: 10px 15px;
            margin: 5px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #00ff99;
            color: black;
        }

        .active {
            background: #00ff99;
            color: black;
            box-shadow: 0 0 10px #00ff99;
        }

        /* 🔥 UPDATED INPUT (Glow Effect) */
        input {
            padding: 12px;
            width: 260px;
            background: black;
            color: #00ff99;
            border: 1px solid #00ff99;
            outline: none;
            font-size: 14px;

            box-shadow: 0 0 5px #00ff99,
                        0 0 10px #00ff99,
                        inset 0 0 5px #00ff99;

            transition: 0.3s;
        }

        input:focus {
            box-shadow: 0 0 10px #00ff99,
                        0 0 20px #00ff99,
                        0 0 30px #00ff99,
                        inset 0 0 10px #00ff99;
        }

        input::placeholder {
            color: #00ff99;
            opacity: 0.6;
        }

        /* 🔥 TERMINAL STYLE FIX */
        #output {
            margin-top: 20px;
            border: 1px solid #00ff99;
            height: 280px;
            overflow-y: auto;
            padding: 10px;
            text-align: left;
            font-family: monospace;
            background: black;

            box-shadow: 0 0 10px #00ff99 inset;
        }

        /* blinking cursor effect */
        #output::after {
            content: "_";
            animation: blink 1s infinite;
        }

        .loading {
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0% {opacity: 1;}
            50% {opacity: 0.3;}
            100% {opacity: 1;}
        }
    </style>
</head>

<body>

<h1>⚡ ZeroTrace Info Gathering ⚡</h1>

<!-- TOOL BUTTONS -->
<button id="whoisBtn" onclick="setTool('whois', this)">WHOIS</button>
<button id="subBtn" onclick="setTool('subdomain', this)">SUBDOMAIN</button>
<button id="dnsBtn" onclick="setTool('dns', this)">DNS</button>
<button id="portBtn" onclick="setTool('portscan', this)">PORT SCAN</button>
<button id="dirBtn" onclick="setTool('dir', this)">DIR BRUTE</button>

<br><br>

<input type="text" id="domain" placeholder="Enter domain (example.com)">
<button onclick="runTool()">Run</button>

<div id="output"></div>

<script>
let selectedTool = "";

// select tool + highlight
function setTool(tool, btn) {
    selectedTool = tool;

    document.querySelectorAll("button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");

    const output = document.getElementById("output");
    output.innerHTML = `⚡ Selected Tool: ${tool.toUpperCase()}<br>`;
}

// run tool
async function runTool() {
    const domain = document.getElementById("domain").value;
    const output = document.getElementById("output");

    if (!domain) {
        output.innerHTML = "❌ Enter domain first";
        return;
    }

    if (!selectedTool) {
        output.innerHTML = "❌ Select a tool first";
        return;
    }

    output.innerHTML += `<br><span class="loading">⚡ Running ${selectedTool.toUpperCase()}...</span><br>`;

    try {
        let url = "";

        if (selectedTool === "whois") url = "http://127.0.0.1:5000/whois";
        else if (selectedTool === "subdomain") url = "http://127.0.0.1:5000/subdomain";
        else if (selectedTool === "dns") url = "http://127.0.0.1:5000/dns";
        else if (selectedTool === "portscan") url = "http://127.0.0.1:5000/portscan";
        else if (selectedTool === "dir") url = "http://127.0.0.1:5000/dir";

        const res = await fetch(url, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ domain })
        });

        const data = await res.json();

        let title = selectedTool.toUpperCase();
        output.innerHTML += `<br>===== ${title} RESULT =====<br>`;

        if (Array.isArray(data)) {
            data.forEach(item => {
                output.innerHTML += item + "<br>";
            });
        } else {
            for (let key in data) {
                output.innerHTML += key + ": " + data[key] + "<br>";
            }
        }

    } catch (err) {
        output.innerHTML += "<br>❌ Backend connection failed<br>";
    }

    output.scrollTop = output.scrollHeight;
}
</script>

</body>
</html>
