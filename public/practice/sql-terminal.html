<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SQL Terminal - ZeroTrace</title>

<style>
body {
    margin: 0;
    background: black;
    color: #00ff9f;
    font-family: monospace;
    padding: 20px;
}

h2 {
    margin-bottom: 10px;
}

.terminal {
    border: 1px solid #00ff9f;
    padding: 15px;
    height: 80vh;
    overflow-y: auto;
    box-shadow: 0 0 20px #00ff9f;
}

.line {
    margin: 4px 0;
}

.input-line {
    display: flex;
}

.prompt {
    margin-right: 5px;
}

input {
    background: transparent;
    border: none;
    color: #00ff9f;
    outline: none;
    width: 100%;
    font-family: monospace;
}
</style>
</head>

<body>

<h2>⚡ SQL Injection Terminal</h2>

<div class="terminal" id="terminal"></div>

<script>

let terminal = document.getElementById("terminal");

/* PRINT FUNCTION */
function print(text){
    const div = document.createElement("div");
    div.className = "line";
    div.textContent = text;
    terminal.appendChild(div);
    terminal.scrollTop = terminal.scrollHeight;
}

/* CREATE INPUT LINE */
function newInput(){
    const line = document.createElement("div");
    line.className = "input-line";

    const prompt = document.createElement("span");
    prompt.className = "prompt";
    prompt.textContent = "sql@zerotrace$ ";

    const input = document.createElement("input");

    line.appendChild(prompt);
    line.appendChild(input);
    terminal.appendChild(line);

    input.focus();

    input.addEventListener("keydown", function(e){
        if(e.key === "Enter"){
            const cmd = input.value.trim();

            // freeze input
            line.removeChild(input);
            const text = document.createElement("span");
            text.textContent = cmd;
            line.appendChild(text);

            runCommand(cmd);
        }
    });
}

/* COMMAND HANDLER */
function runCommand(cmd){

    if(cmd === "help"){
        print("Available commands:");
        print("scan <url>        → Scan target for SQL injection");
        print("dump db           → Dump database tables");
        print("clear             → Clear terminal");
        print("exit              → Stop tool");
    }

    else if(cmd.startsWith("scan")){
        print("Starting SQL Injection scan...");
        print("Target detected...");
        print("Testing parameters...");

        setTimeout(()=>{
            print("Parameter 'id' is vulnerable!");
            print("Database: MySQL");
            print("Injection type: UNION-based");
            print("✔ Scan completed");
            newInput();
        },1000);

        return;
    }

    else if(cmd === "dump db"){
        print("Fetching database...");
        setTimeout(()=>{
            print("Tables:");
            print("- users");
            print("- admin");
            print("- payments");
            print("✔ Dump complete");
            newInput();
        },1000);

        return;
    }

    else if(cmd === "clear"){
        terminal.innerHTML = "";
        boot();
        return;
    }

    else if(cmd === "exit"){
        print("Exiting SQL terminal...");
        return;
    }

    else{
        print("Command not found");
    }

    newInput();
}

/* BOOT */
function boot(){
    print("ZeroTrace SQL Injection Tool");
    print("Type 'help' to begin");
    newInput();
}

boot();

</script>

</body>
</html>
