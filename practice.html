<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Practice Labs - ZeroTrace</title>

<style>
body {
    margin: 0;
    background: #0a0f1c;
    font-family: 'Courier New', monospace;
    color: #00fff7;
}

/* CENTER */
.labs-wrapper {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

/* CONTAINER */
.labs-container {
    width: 100%;
    max-width: 1100px;
    text-align: center;
}

/* TITLE */
h1 {
    margin-bottom: 40px;
}

/* GRID */
.labs-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 30px;
}

/* CARD */
.lab-card {
    border: 1px solid #00fff7;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 0 15px rgba(0,255,247,0.2);
    transition: 0.3s;
}

.lab-card:hover {
    transform: translateY(-8px);
    box-shadow: 0 0 25px #00fff7;
}

/* BUTTON */
button {
    margin-top: 15px;
    padding: 10px 16px;
    background: transparent;
    border: 1px solid #00fff7;
    color: #00fff7;
    cursor: pointer;
    border-radius: 6px;
    transition: 0.3s;
}

button:hover {
    background: #00fff7;
    color: black;
}
</style>
</head>

<body>

<div class="labs-wrapper">
<div class="labs-container">

<h1>🧪 Practice Labs</h1>

<div class="labs-grid">

<!-- 🔐 BRUTE FORCE -->
<div class="lab-card">
    <h2>🔐 Brute Force Lab</h2>
    <p>Try to crack the login using brute force logic</p>
    <button id="bfBtn" onclick="go('practice/bruteforce.html')">
        Start Lab
    </button>
</div>

<!-- 💉 SQL -->
<div class="lab-card">
    <h2>💉 SQL Injection Lab</h2>
    <p>Test login bypass using SQL injection</p>
    <button onclick="comingSoon()">Coming Soon</button>
</div>

<!-- ⚡ XSS -->
<div class="lab-card">
    <h2>⚡ XSS Lab</h2>
    <p>Try injecting scripts into input fields</p>
    <button onclick="comingSoon()">Coming Soon</button>
</div>

</div>

</div>
</div>

<!-- 🔥 PROGRESS TRACK -->
<script src="assets/js/progress.js"></script>

<script>
function go(page){
    window.location.href = page;
}

function comingSoon(){
    alert("🚀 This lab is coming soon!");
}

/* ✅ CHECK COMPLETION */
if(localStorage.getItem("bruteforce") === "done"){
    document.getElementById("bfBtn").innerText = "✅ Completed";
}
</script>

</body>
</html>
