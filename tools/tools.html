<!DOCTYPE html>

<meta charset="UTF-8">
<title>ZeroTrace Tools Hub</title>

<style>
body{
    margin:0;
    background: radial-gradient(circle at top, #0a0a0a, #000);
    color:#00ffc3;
    font-family:monospace;
}

/* HEADER */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 40px;
}

.logo{
    font-size:26px;
    font-weight:bold;
}

/* BACK BUTTON */
.back{
    border:1px solid #00ffc3;
    padding:6px 14px;
    cursor:pointer;
    transition:0.3s;
}

.back:hover{
    background:#00ffc3;
    color:#000;
    box-shadow:0 0 10px #00ffc3;
}

/* SECTION */
.section-title{
    padding:0 40px;
    margin-top:40px;
    font-size:18px;
}

/* GRID */
.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:40px;
    padding:20px 40px;
}

/* CARD */
.card{
    border:2px solid #00ffc3;
    padding:30px;
    text-align:center;
    border-radius:10px;
    transition:0.3s;
}

.card:hover{
    box-shadow:0 0 20px #00ffc3;
    transform:scale(1.03);
}

/* BUTTON */
button{
    margin-top:10px;
    padding:8px 15px;
    border:1px solid #00ffc3;
    background:none;
    color:#00ffc3;
    cursor:pointer;
}

button:hover{
    background:#00ffc3;
    color:#000;
}

/* FOOTER */
.footer{
    text-align:center;
    margin:40px 0;
    opacity:0.6;
}
</style>
</head>
