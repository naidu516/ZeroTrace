<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZeroTrace Login</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #0a0f1c;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #00fff7;
        }

        .login-box {
            border: 1px solid #00fff7;
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0,255,247,0.3);
            width: 90%;
            max-width: 350px;
        }

        h1 {
            margin-bottom: 10px;
        }

        p {
            font-size: 14px;
            opacity: 0.7;
            margin-bottom: 30px;
        }

        button {
            background: #00fff7;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            color: #000;
            transition: 0.3s;
            width: 100%;
        }

        button:hover {
            background: #00cfc7;
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
    </style>
</head>

<body>

    <div class="login-box">
        <h1>🔐 ZeroTrace</h1>
        <p>Secure Cyber Tracker</p>

        <button id="loginBtn" onclick="loginWithGoogle()">
            Continue with Google
        </button>
    </div>

    <!-- 🔥 Firebase Login Script -->
    <script type="module" src="assets/js/login.js"></script>

</body>
</html>
