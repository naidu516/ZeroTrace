<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZeroTrace Login</title>

<style>
body {
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:black;
    font-family:Arial;
}

.login-box {
    border:1px solid #00ff9f;
    padding:40px;
    border-radius:10px;
    text-align:center;
    box-shadow:0 0 20px #00ff9f;
}

h1 {
    color:#00ff9f;
}

button {
    padding:12px 20px;
    background:#00ff9f;
    border:none;
    color:black;
    cursor:pointer;
    margin-top:20px;
    font-weight:bold;
}

button:hover {
    background:#00cc7a;
}
</style>
</head>

<body>

<div class="login-box">
    <h1>🔐 ZeroTrace</h1>
    <p style="color:#00ff9f;">Secure Access Required</p>

    <button id="loginBtn" onclick="loginWithGoogle()">
        Continue with Google
    </button>
</div>

<!-- 🔥 IMPORTANT: type="module" -->
<script type="module" src="assets/js/login.js"></script>

</body>
</html>
